<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Splash - OurStory</title>
    
    <meta name="theme-color" content="#874e58">
    <link rel="manifest" href="/manifest.json">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <link href="../assets/css/tailwind.css" rel="stylesheet">
    <link href="../assets/css/main.css" rel="stylesheet">
    
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #ffb6c1 0%, #cebdff 50%, #cae6ff 100%);
            min-height: 100vh;
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        @keyframes pulse-soft {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); }
        }
        @keyframes heart-beat {
            0% { transform: scale(1); }
            14% { transform: scale(1.1); }
            28% { transform: scale(1); }
            42% { transform: scale(1.1); }
            70% { transform: scale(1); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-pulse-soft { animation: pulse-soft 4s ease-in-out infinite; }
        .animate-heart { animation: heart-beat 2s infinite ease-in-out; }
    </style>
</head>
<body>
    <div class="gradient-bg flex flex-col items-center justify-center relative px-4">
        <!-- Decorative Orbs -->
        <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-primary/20 blur-[120px] animate-pulse-soft"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40vw] h-[40vw] rounded-full bg-secondary/20 blur-[120px] animate-pulse-soft"></div>
        
        <div class="z-10 flex flex-col items-center gap-8 max-w-lg w-full text-center">
            <!-- Logo -->
            <div class="glass-morphism p-8 rounded-xl animate-float">
                <div class="flex flex-col items-center gap-4">
                    <div class="w-24 h-24 bg-gradient-to-tr from-[#874e58] to-[#645495] rounded-full flex items-center justify-center shadow-lg shadow-primary/20 transition-transform duration-500 hover:scale-110">
                        <span class="material-symbols-outlined text-white text-[48px] animate-heart filled">favorite</span>
                    </div>
                    <h1 class="font-headline-md text-headline-md text-[#874e58] tracking-tight">OurStory Together</h1>
                    <p class="font-label-md text-label-md text-[#514345]/80 uppercase tracking-widest">Shared Sanctuary</p>
                </div>
            </div>
            
            <!-- Illustration -->
            <div class="relative w-full max-w-[320px] animate-pulse-soft">
                <div class="absolute inset-0 bg-white/30 rounded-full blur-3xl opacity-50"></div>
                <img class="w-full h-full object-contain relative z-20 drop-shadow-2xl" alt="Couple illustration" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDB8JsjK-iaTEsVfn8IjxWjoVCVw1zgr4bdkQ-YFfV62eEr2ec9W63WVYJI8x-bGG3dNfeKcuZpuPYChNqKMavqw3zK3tX9uLRandKV8ri_S9KM1lMf_FnQvudI0DKPN91HgjzNMxlLUyrarNM9qnoEzEMFbNeuPT0_VdIpVfl_99K_uNu5YOTJ7Mv10IHrnJrXHHuZLpBQRRZO3_QOIWETLUmLIcHUhqQX4aE2HxjprBgmVKTzEPyE49DnCOyBCN6znLfzeRqi9Yw" />
            </div>
            
            <!-- Messaging -->
            <div class="space-y-4">
                <h2 class="font-display-lg-mobile text-[#fcb3be] drop-shadow-sm leading-tight" style="font-size: 28px;">Every memory deserves a beautiful place.</h2>
                <div class="h-1 w-12 bg-primary/30 mx-auto rounded-full"></div>
            </div>
            
            <!-- Progress Bar -->
            <div class="w-48 h-1.5 bg-white/30 rounded-full overflow-hidden">
                <div class="h-full bg-gradient-to-r from-[#874e58] via-[#645495] to-[#316385] w-0 transition-all duration-[3000ms] ease-out" id="progress-bar"></div>
            </div>
            
            <!-- Button -->
            <button class="mt-4 px-8 py-4 rounded-full bg-white/20 border border-white/40 text-[#874e58] font-headline-sm hover:bg-white/40 hover:scale-105 active:scale-95 transition-all duration-300 glass-morphism" id="splash-start">
                Begin Our Journey
            </button>
        </div>
        
        <!-- Particles Canvas -->
        <canvas class="absolute inset-0 pointer-events-none opacity-40" id="particleCanvas"></canvas>
    </div>
    
    <script>
        // Progress bar
        setTimeout(() => {
            document.getElementById('progress-bar').style.width = '100%';
        }, 500);
        
        // Start button
        document.getElementById('splash-start').addEventListener('click', () => {
            window.location.href = '../pages/welcome.html';
        });
        
        // Particles
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for (let i = 0; i < 25; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 4 + 1,
                    speedX: Math.random() * 0.5 - 0.25,
                    speedY: Math.random() * 0.5 - 0.25,
                    opacity: Math.random() * 0.5 + 0.1
                });
            }
        }
        
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.speedX;
                p.y += p.speedY;
                if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
                if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                ctx.fill();
            });
            requestAnimationFrame(animateParticles);
        }
        
        initParticles();
        animateParticles();
        window.addEventListener('resize', initParticles);
    </script>
</body>
</html>
